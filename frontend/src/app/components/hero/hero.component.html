<section class="hero-section">
  <div class="search-bar">
    <div class="search-field">
      <label>Onde</label>
      <input type="text" placeholder="Explore destinos em Angola e no mundo">
    </div>
    <div class="divider"></div>
    <div class="search-field">
      <label>Check-in</label>
      <input type="text" placeholder="Adicione datas">
    </div>
    <div class="divider"></div>
    <div class="search-field">
      <label>Check-out</label>
      <input type="text" placeholder="Adicione datas">
    </div>
    <div class="divider"></div>
    <div class="search-field">
      <label>Quem</label>
      <input type="text" placeholder="Hóspedes">
    </div>
    <button class="search-button">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="presentation" focusable="false" style="display: block; fill: none; height: 16px; width: 16px; stroke: currentcolor; stroke-width: 4; overflow: visible;"><g fill="none"><path d="m13 24c6.0751322 0 11-4.9248678 11-11 0-6.07513225-4.9248678-11-11-11-6.07513225 0-11 4.92486775-11 11 0 6.0751322 4.92486775 11 11 11zm8-3 9 9"></path></g></svg>
    </button>
  </div>
  
  <div class="ai-banner">
    <div class="ai-content">
      <h2>Planeje com Inteligência Artificial</h2>
      <p>Geramos um roteiro completo adaptado ao seu orçamento (em AOA) e preferências de viagem.</p>
      <button class="btn-primary" routerLink="/ai-planner">Gerar Roteiro Mágico</button>
    </div>
  </div>

  <h2 class="section-title">Destinos em Destaque</h2>
  
  <div class="destinations-grid">
    <div class="card" *ngFor="let dest of destinations">
      <div class="image-wrapper">
        <img [src]="dest.image" [alt]="dest.name">
        <button class="favorite-btn">
            <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="presentation" focusable="false" style="display: block; fill: rgba(0, 0, 0, 0.5); height: 24px; width: 24px; stroke: var(--color-background); stroke-width: 2; overflow: visible;"><path d="m16 28c7-4.733 14-10 14-17 0-1.792-.683-3.583-2.05-4.95-1.367-1.366-3.158-2.05-4.95-2.05-1.791 0-3.583.684-4.949 2.05l-2.051 2.051-2.05-2.051c-1.367-1.366-3.158-2.05-4.95-2.05-1.791 0-3.583.684-4.949 2.05-1.367 1.367-2.051 3.158-2.051 4.95 0 7 7 12.267 14 17z"></path></svg>
        </button>
      </div>
      <div class="card-info">
        <h3>{{ dest.name }}</h3>
        <p class="desc">{{ dest.description }}</p>
        <p class="price">A partir de <strong>{{ dest.price }}</strong></p>
      </div>
    </div>
  </div>
</section>
