<div class="layout" [class.layout--menu-open]="menuOpen">
  <div class="layout__backdrop" *ngIf="menuOpen" (click)="closeMenu()" aria-hidden="true"></div>

  <aside class="layout__sidebar" (click)="closeMenu()">
    <div class="layout__brand">
      <span class="layout__logo" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
          <path
            d="M6 22L16 6l10 16H6z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <circle cx="16" cy="20" r="2.2" fill="currentColor" />
        </svg>
      </span>
      <div>
        <strong>Voyage</strong>
        <small>Planeamento inteligente</small>
      </div>
    </div>

    <nav class="layout__nav">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9.5z" stroke-linejoin="round" />
        </svg>
        Painel
      </a>
      <a routerLink="/trips" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 7h16M4 12h10M4 17h14" stroke-linecap="round" />
          <circle cx="18" cy="7" r="2" fill="currentColor" />
        </svg>
        Viagens
      </a>
      <a routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="3.5" />
          <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke-linecap="round" />
        </svg>
        Perfil
      </a>
      <a *ngIf="user?.role === 'admin'" routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 3l2 4 4.5.5-3 3 1 4.5L12 16l-4.5 2 1-4.5-3-3L10 7l2-4z" stroke-linejoin="round" />
        </svg>
        Admin
      </a>
    </nav>

    <div class="layout__sidebar-foot">
      <p>Organize destinos, itinerários e orçamentos num só lugar.</p>
    </div>
  </aside>

  <div class="layout__content">
    <header class="layout__topbar">
      <div class="layout__topbar-left">
        <button type="button" class="layout__burger" (click)="toggleMenu(); $event.stopPropagation()" aria-label="Abrir menu">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7h16M4 12h16M4 17h10" stroke-linecap="round" />
          </svg>
        </button>
        <span class="layout__crumb">Sistema de Planejamento de Viagens</span>
      </div>
      <nav class="layout__toplinks">
        <button type="button" class="layout__theme" (click)="theme.toggle()" [attr.aria-label]="theme.mode$.value === 'dark' ? 'Tema claro' : 'Tema escuro'">
          <ng-container *ngIf="theme.mode$ | async as m">
            <svg *ngIf="m === 'light'" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4" stroke-linecap="round" />
              <circle cx="12" cy="12" r="4" />
            </svg>
            <svg *ngIf="m === 'dark'" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M21 14.5A8.5 8.5 0 0111.5 3a6.6 6.6 0 109.5 11.5z" stroke-linejoin="round" />
            </svg>
          </ng-container>
        </button>
        <a routerLink="/home" class="layout__link-muted">Site público</a>
        <span class="layout__user" *ngIf="user">
          <span class="layout__avatar" aria-hidden="true">{{ user.full_name.charAt(0) | uppercase }}</span>
          {{ user.full_name }}
        </span>
        <button type="button" class="layout__logout" (click)="logout()">Sair</button>
      </nav>
    </header>
    <main class="layout__outlet" (click)="closeMenu()">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
