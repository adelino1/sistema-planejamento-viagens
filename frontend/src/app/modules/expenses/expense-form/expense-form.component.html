<div class="expense-form">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="expense-form__row">
      <div class="expense-form__field expense-form__field--half">
        <label>
          <span>Categoria</span>
          <select formControlName="category" required>
            <option *ngFor="let cat of categories" [value]="cat.value">
              {{ cat.label }}
            </option>
          </select>
        </label>
      </div>

      <div class="expense-form__field expense-form__field--half">
        <label>
          <span>Valor</span>
          <input 
            type="number" 
            formControlName="amount" 
            step="0.01" 
            min="0" 
            required 
            placeholder="0.00"
          >
        </label>
      </div>
    </div>

    <div class="expense-form__row">
      <div class="expense-form__field expense-form__field--half">
        <label>
          <span>Moeda</span>
          <select formControlName="currency" required>
            <option *ngFor="let curr of currencies" [value]="curr.value">
              {{ curr.label }}
            </option>
          </select>
        </label>
      </div>

      <div class="expense-form__field expense-form__field--half">
        <label>
          <span>Data</span>
          <input type="date" formControlName="expense_date" required>
        </label>
      </div>
    </div>

    <div class="expense-form__field">
      <label>
        <span>Descrição</span>
        <input 
          type="text" 
          formControlName="description" 
          placeholder="Descrição opcional"
        >
      </label>
    </div>

    <div class="expense-form__field">
      <label class="expense-form__checkbox">
        <input type="checkbox" formControlName="is_estimated">
        <span>Despesa estimada (não realizada ainda)</span>
      </label>
    </div>

    <div class="expense-form__actions">
      <button type="button" class="btn-ghost" (click)="onCancel()" [disabled]="loading">
        Cancelar
      </button>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Guardando...' : (expense ? 'Atualizar' : 'Adicionar') }}
      </button>
    </div>
  </form>
</div>
