<div class="notification-bell">
  <button class="notification-bell__button" (click)="toggleDropdown()">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M13.73 21a2 2 0 01-3.46 0" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <span class="notification-bell__badge" *ngIf="unreadCount > 0">
      {{ unreadCount > 99 ? '99+' : unreadCount }}
    </span>
  </button>

  <div class="notification-bell__dropdown" *ngIf="isOpen" (click)="$event.stopPropagation()">
    <div class="notification-bell__header">
      <h3>Notificações</h3>
      <button class="notification-bell__mark-read" (click)="markAllAsRead()" *ngIf="unreadCount > 0">
        Marcar todas como lidas
      </button>
    </div>
    <div class="notification-bell__content">
      <p class="notification-bell__empty" *ngIf="unreadCount === 0">
        Sem notificações novas
      </p>
      <p class="notification-bell__loading" *ngIf="unreadCount > 0">
        Carregando notificações...
      </p>
    </div>
  </div>

  <div class="notification-bell__backdrop" *ngIf="isOpen" (click)="closeDropdown()"></div>
</div>
