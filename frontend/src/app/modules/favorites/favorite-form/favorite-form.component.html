<div class="favorite-form">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="favorite-form__field">
      <label>
        <span>Tipo</span>
        <select formControlName="favorite_type" required>
          <option *ngFor="let type of types" [value]="type.value">
            {{ type.label }}
          </option>
        </select>
      </label>
    </div>

    <div class="favorite-form__field">
      <label>
        <span>Nome do favorito *</span>
        <input 
          type="text" 
          formControlName="label" 
          placeholder="Ex: Paris, Torre Eiffel, etc."
          required
          maxlength="200"
        >
      </label>
    </div>

    <div class="favorite-form__row">
      <div class="favorite-form__field favorite-form__field--half">
        <label>
          <span>Cidade</span>
          <input type="text" formControlName="city" placeholder="Ex: Paris">
        </label>
      </div>

      <div class="favorite-form__field favorite-form__field--half">
        <label>
          <span>País</span>
          <input type="text" formControlName="country" placeholder="Ex: França">
        </label>
      </div>
    </div>

    <div class="favorite-form__row">
      <div class="favorite-form__field favorite-form__field--half">
        <label>
          <span>Latitude (opcional)</span>
          <input type="number" formControlName="latitude" step="any" placeholder="0.0000">
        </label>
      </div>

      <div class="favorite-form__field favorite-form__field--half">
        <label>
          <span>Longitude (opcional)</span>
          <input type="number" formControlName="longitude" step="any" placeholder="0.0000">
        </label>
      </div>
    </div>

    <div class="favorite-form__actions">
      <button type="button" class="btn-ghost" (click)="onCancel()" [disabled]="loading">
        Cancelar
      </button>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Guardando...' : (favorite ? 'Atualizar' : 'Adicionar') }}
      </button>
    </div>
  </form>
</div>
