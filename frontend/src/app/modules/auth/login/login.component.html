<div class="auth-page">
  <div class="auth-page__visual" [style.background-image]="'url(' + visualBg + ')'">
    <div class="auth-page__visual-inner">
      <h2>Bem-vindo de volta</h2>
      <p>Continue o seu roteiro, orçamentos e dias de viagem num painel pensado para impressionar.</p>
    </div>
  </div>
  <div class="auth-page__panel">
    <div class="auth-page__card">
      <h1>Iniciar sessão</h1>
      <p class="auth-page__hint">Aceda ao painel de planeamento de viagens.</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-page__form">
        <label>
          <span>Email</span>
          <input type="email" formControlName="email" autocomplete="username" />
        </label>
        <label>
          <span>Palavra-passe</span>
          <input type="password" formControlName="password" autocomplete="current-password" />
        </label>

        <p class="auth-page__error" *ngIf="error">{{ error }}</p>

        <button type="submit" class="btn-primary" [disabled]="form.invalid">Entrar</button>
      </form>

      <nav class="auth-page__links">
        <a routerLink="/auth/register">Criar conta</a>
        <a routerLink="/auth/forgot-password">Esqueci a palavra-passe</a>
        <a routerLink="/home">Voltar ao início</a>
      </nav>
    </div>
  </div>
</div>
