<section class="auth">
  <h1>Criar conta</h1>
  <p class="auth__hint">Utilizador normal por defeito. Administradores são criados via script CLI.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form">
    <label>
      <span>Nome completo</span>
      <input type="text" formControlName="full_name" autocomplete="name" />
    </label>
    <label>
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="username" />
    </label>
    <label>
      <span>Palavra-passe</span>
      <input type="password" formControlName="password" autocomplete="new-password" />
    </label>

    <p class="auth__error" *ngIf="error">{{ error }}</p>

    <button type="submit" [disabled]="form.invalid">Registar</button>
  </form>

  <nav class="auth__links">
    <a routerLink="/auth/login">Já tenho conta</a>
    <a routerLink="/home">Voltar ao início</a>
  </nav>
</section>
