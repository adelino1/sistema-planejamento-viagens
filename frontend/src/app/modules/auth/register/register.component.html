<div class="auth-page">
  <div class="auth-page__visual" [style.background-image]="'url(' + visualBg + ')'">
    <div class="auth-page__visual-inner">
      <h2>Junte-se à comunidade</h2>
      <p>Organize destinos com uma experiência visual moderna — inspirada nos melhores produtos de viagem.</p>
    </div>
  </div>
  <div class="auth-page__panel">
    <div class="auth-page__card">
      <h1>Criar conta</h1>
      <p class="auth-page__hint">Utilizador normal por defeito. Administradores são criados via script CLI.</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-page__form">
        <label>
          <span>Nome completo</span>
          <input type="text" formControlName="full_name" autocomplete="name" />
        </label>
        <label>
          <span>Email</span>
          <input type="email" formControlName="email" autocomplete="username" />
        </label>
        <label>
          <span>Palavra-passe</span>
          <input type="password" formControlName="password" autocomplete="new-password" />
        </label>

        <p class="auth-page__error" *ngIf="error">{{ error }}</p>

        <button type="submit" class="btn-primary" [disabled]="form.invalid">Registar</button>
      </form>

      <nav class="auth-page__links">
        <a routerLink="/auth/login">Já tenho conta</a>
        <a routerLink="/home">Voltar ao início</a>
      </nav>
    </div>
  </div>
</div>
