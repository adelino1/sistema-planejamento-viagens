<div class="auth-page">
  <div class="auth-page__visual" [style.background-image]="'url(' + visualBg + ')'">
    <div class="auth-page__visual-inner">
      <h2>Nova palavra-passe</h2>
      <p>Conclua o processo com o token que recebeu por canal seguro (ou pelo log em modo debug).</p>
    </div>
  </div>
  <div class="auth-page__panel">
    <div class="auth-page__card">
      <h1>Redefinir palavra-passe</h1>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-page__form" *ngIf="!message">
        <label>
          <span>Token</span>
          <input type="text" formControlName="token" autocomplete="one-time-code" />
        </label>
        <label>
          <span>Nova palavra-passe</span>
          <input type="password" formControlName="password" autocomplete="new-password" />
        </label>

        <p class="auth-page__error" *ngIf="error">{{ error }}</p>

        <button type="submit" class="btn-primary" [disabled]="form.invalid">Guardar</button>
      </form>

      <p *ngIf="message" class="auth-page__success">{{ message }} A redirecionar…</p>

      <nav class="auth-page__links">
        <a routerLink="/auth/login">Login</a>
        <a routerLink="/home">Início</a>
      </nav>
    </div>
  </div>
</div>
