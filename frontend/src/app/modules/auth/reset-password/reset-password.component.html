<section class="auth">
  <h1>Redefinir palavra-passe</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form" *ngIf="!message">
    <label>
      <span>Token</span>
      <input type="text" formControlName="token" autocomplete="one-time-code" />
    </label>
    <label>
      <span>Nova palavra-passe</span>
      <input type="password" formControlName="password" autocomplete="new-password" />
    </label>

    <p class="auth__error" *ngIf="error">{{ error }}</p>

    <button type="submit" [disabled]="form.invalid">Guardar</button>
  </form>

  <p *ngIf="message" class="auth__success">{{ message }} A redirecionar…</p>

  <nav class="auth__links">
    <a routerLink="/auth/login">Login</a>
    <a routerLink="/home">Início</a>
  </nav>
</section>
