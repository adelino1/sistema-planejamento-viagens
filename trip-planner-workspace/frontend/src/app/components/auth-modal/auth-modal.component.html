<div *ngIf="auth.showAuthModal()" class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Overlay -->
  <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm" (click)="auth.closeModal()"></div>
  
  <!-- Modal Card -->
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all animate-fade-in-up">
    <!-- Header -->
    <div class="px-8 py-6 text-center border-b border-gray-100">
      <h2 class="text-2xl font-bold text-gray-900">
        {{ mode === 'register' ? 'Salve seu Roteiro' : 'Bem-vindo de volta' }}
      </h2>
      <p class="text-sm text-gray-500 mt-2">
        {{ mode === 'register' 
            ? 'Crie uma conta para sincronizar suas ideias e acessar a plataforma completa.' 
            : 'Faça login para continuar de onde parou.' }}
      </p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="submit()" class="p-8 space-y-4">
      <div *ngIf="mode === 'register'">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
        <input type="text" [(ngModel)]="name" name="name" required placeholder="Como quer ser chamado?"
          class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="seu@email.com"
          class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••"
          class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
      </div>

      <button type="submit" [disabled]="isLoading"
        class="w-full py-3 mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md shadow-blue-200 transition-colors disabled:opacity-70 flex justify-center">
        <span *ngIf="!isLoading">{{ mode === 'register' ? 'Criar Conta e Salvar' : 'Entrar' }}</span>
        <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>
    </form>

    <!-- Footer Toggle -->
    <div class="px-8 py-4 bg-gray-50 border-t border-gray-100 text-center">
      <button type="button" (click)="mode = mode === 'login' ? 'register' : 'login'" class="text-sm text-blue-600 font-medium hover:underline">
        {{ mode === 'register' ? 'Já tem uma conta? Faça login' : 'Ainda não tem conta? Crie grátis' }}
      </button>
    </div>
  </div>
</div>

<style>
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translate3d(0, 10px, 0) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
    }
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
</style>
